  <script>
    // --- Xlaflix style popup pour les films ---
    const actionFilms = [

      { title: "Longmen Town Inn | L’honneur se gagne par le sabre ", video: "https://www.youtube.com/embed/yVJg9YE9b1w", description: "Pour défendre la justice, un jeune ranger expert en arts martiaux affronte son propre père et ses frères." },
      { title: "Kung Fu Master", video: "https://www.youtube.com/embed/7f9Gmd-Oe6E", description: "Relâché de prison, un pro du kung-fu essaye d'aider la police à retrouver un dangereux tueur en série qui cible les maîtres en arts martiaux." },
      { title: "Révolution : kung-fu", video: "https://www.youtube.com/embed/0PZCsfv5B3Q", recent: true, description: "Le jeu où il ne faut pas rire !" },
      { title: "Le petit détective", video: "https://www.youtube.com/embed/H87lFSP4oKM", description: "Lorsque un jeu garçon et sa famille emménagent dans un manoir mystérieux, le jeune détective se donne pour mission d'élucider le cas d'une jeune fille disparue quarante ans plus tôt" },
      { title: "Take Cover", video: "https://www.youtube.com/embed/XT8_Z6tMZDM", description: "L'essor du crack à Los Angeles." },
      { title: "Mutant Tiger", video: "https://www.youtube.com/embed/vWXXQVTeSmE", recent: true, description: "Un maître du Feng Shui décide de créer une arène de tigres au centre de la capitale. Mais un étrange virus infecte les animaux et voilà que des centaines de tigres mutants se répandent dans les rues et noient la ville dans le sang." },
      { title: "Mutant Carnage", video: "https://www.youtube.com/embed/CRUV5eH_x6E", description: "Des mutants, créés par des recherches secrètes, menacent la société et intensifient la lutte entre le bien et le mal." },
      { title: "7 minutes pour braquer une banque ultra-sécurisée", video: "https://www.youtube.com/embed/ZUZZabk1Dp0", description: "Pour régler leurs dettes, trois étudiants sont forcés de braquer une banque en un temps record, sous peine de représailles." },
      { title: "CINQ DAMES POUR UNE SURPRISE", video: "https://www.youtube.com/embed/mfIahOt6sFE", description: "CINQ DAMES POUR UNE SURPRISE" },
      { title: "COEUR PROPRE", video: "https://www.youtube.com/embed/HcuDWjdNR4s", description: "COEUR PROPRE- RUTH KADIRI EDDIE WATSON" }
    ];
    const fantasticFilms = [
      { title: "Wicked", video: "https://www.youtube.com/embed/6EOvLud0Lj0", description: "La magie prend vie." },
      { title: "Kraven the Hunter", video: "https://www.youtube.com/embed/o2MkPfKefzc", description: "Le chasseur ultime." },
      { title: "Harry Potter et le Prisonnier d'Azkaban", video: "https://www.youtube.com/embed/U7gMKQDrLl0", top50: true, description: "Le troisième volet de la saga magique." },
      { title: "Adaline", video: "https://www.youtube.com/embed/7DWfT3o5Eec", description: "Une vie hors du temps." },
      { title: "La Mort d'une Licorne", video: "https://www.youtube.com/embed/NgksuMW8PaY", top50: true, description: "Une aventure fantastique." },
      { title: "Blanche Neige", video: "https://www.youtube.com/embed/L07jRYAW3Lg", top50: true, description: "Le conte revisité." },
      { title: "Red One", video: "https://www.youtube.com/embed/Z8k7HacumJ0", description: "Action et magie pour Noël." },
      { title: "Ratatouille", video: "https://www.youtube.com/embed/3XS5MP-G2i8", description: "Un rat chef étoilé à Paris." },
      { title: "Descendants : L’Ascension de Red", video: "https://www.youtube.com/embed/PFQIU-0e8pc", description: "Les enfants de méchants prennent le pouvoir." },
      { title: "Les Visiteurs", video: "https://www.youtube.com/embed/C_qT7s-Ox_o", description: "Voyage dans le temps loufoque." },
      { title: "Les 4 Fantastiques", video: "https://www.youtube.com/embed/Df1OpZySFsI", description: "Les super-héros de Marvel." },
      { title: "Kenshin : le vagabond", video: "https://www.youtube.com/embed/3WYPTt8e-0k", description: "Le samouraï errant." }
    ];
    const horrorFilms = [
      { title: "God Save the Tuche", video: "https://www.youtube.com/embed/N9yAfVin2Sg", recent: true, description: "Comédie familiale déjantée." },
      { title: "Sinners", video: "https://www.youtube.com/embed/MWkBSgAWGiM",recent: true, description: "Court-métrage dramatique." },
      { title: "Minecraft, Le Film", video: "https://www.youtube.com/embed/cCbKfFTLiAM", description: "L'univers du jeu culte adapté au cinéma." },
      { title: "Le Challenge", video: "https://www.youtube.com/embed/VAhViiRDr3s", description: "Un défi hors du commun." },
      { title: "A Working Man", video: "https://www.youtube.com/embed/iXJEXVPX9bU", description: "Portrait d'un homme ordinaire." },
      { title: "La Mort d'une Licorne", video: "https://www.youtube.com/embed/doSBRtKDP5s", description: "Une aventure fantastique." },
      { title: "Sous écrous", video: "https://www.youtube.com/embed/QRQy-MyGf9Y", description: "Thriller carcéral haletant." },
      { title: "Boot Camp", video: "https://www.youtube.com/embed/GKdOuxUYfjw", description: "L'entraînement de l'extrême." },
      { title: "Le Retour des Thunderman", video: "https://www.youtube.com/embed/AVKmklJSFbM", description: "Les super-héros sont de retour !" },
      { title: "Henry Danger : Le Film", video: "https://www.youtube.com/embed/JfFL4T7ytGc", description: "Aventures et humour au rendez-vous." },
      { title: "Henry Danger : Le Film", video: "https://www.youtube.com/embed/k-DUe1BORzM", description: "Aventures et humour au rendez-vous." },
      { title: "Henry Danger : Le Film", video: "https://www.youtube.com/embed/av9B5QgOZoA", description: "Aventures et humour au rendez-vous." }
    ];

    function getYoutubeId(url) {
      const match = url.match(/embed\/([a-zA-Z0-9_-]+)/);
      return match ? match[1] : null;
    }

    function createCard(item) {
      const youtubeId = getYoutubeId(item.video);
      const thumbnail = youtubeId
        ? `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`
        : null;

      // Ajout du popup Xlaflix au clic
      return `
        <div class="card" tabindex="0"
          data-title="${encodeURIComponent(item.title)}"
          data-video="${encodeURIComponent(item.video)}"
          data-description="${encodeURIComponent(item.description || '')}"
          data-thumbnail="${encodeURIComponent(thumbnail || '')}"
          onclick="showXlaflixPopup(this)">
          <div class="video-cover">
            ${thumbnail ? `<img src="${thumbnail}" alt="${item.title}" style="width:100%;height:180px;object-fit:cover;cursor:pointer;">` : `<span>Vidéo non supportée</span>`}
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:white;text-shadow:0 0 8px #000;">&#9658;</div>
          </div>
          <div class="card-title">${item.title}</div>
        </div>
      `;
    }

    document.getElementById('action-films').innerHTML =
      actionFilms.map(createCard).join('');
    document.getElementById('fantastic-films').innerHTML =
      fantasticFilms.map(createCard).join('');
    document.getElementById('horror-films').innerHTML =
      horrorFilms.map(createCard).join('');

    // Popup Xlaflix style
    window.showXlaflixPopup = function(cardElem) {
      const title = decodeURIComponent(cardElem.getAttribute('data-title'));
      const video = decodeURIComponent(cardElem.getAttribute('data-video'));
      const description = decodeURIComponent(cardElem.getAttribute('data-description'));
      const thumbnail = decodeURIComponent(cardElem.getAttribute('data-thumbnail'));

      let popup = document.getElementById('xlaflix-popup');
      if (popup) popup.remove();
      popup = document.createElement('div');
      popup.id = 'xlaflix-popup';
      popup.style.position = 'fixed';
      popup.style.top = 0;
      popup.style.left = 0;
      popup.style.width = '100vw';
      popup.style.height = '100vh';
      popup.style.background = 'rgba(0,0,0,0.92)';
      popup.style.display = 'flex';
      popup.style.alignItems = 'center';
      popup.style.justifyContent = 'center';
      popup.style.zIndex = 10001;
      popup.innerHTML = `
        <div style="background:#18122b;max-width:98vw;width:420px;border-radius:18px;box-shadow:0 8px 32px #000;position:relative;padding:0 0 24px 0;">
          <button id="close-xlaflix-popup" style="position:absolute;top:12px;right:12px;background:#e50914;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:1.3rem;cursor:pointer;z-index:2;">&times;</button>
          <div style="padding:24px 24px 0 24px;">
            <div style="position:relative;">
              <img src="${thumbnail}" alt="${title}" style="width:100%;max-width:100%;border-radius:12px;box-shadow:0 2px 16px #000a;transition:transform 0.2s;cursor:pointer;" id="popup-thumbnail">
            </div>
            <div style="margin:18px 0 8px 0;font-size:1.2rem;font-weight:bold;color:#fff;text-align:center;">${title}</div>
            <div style="color:#e50914;font-size:1rem;text-align:center;margin-bottom:12px;">${description || ""}</div>
          </div>
          <div style="padding:0 24px;">
            <div id="popup-video-container" style="margin-top:10px;display:flex;justify-content:center;">
              <button id="play-xlaflix-video" style="background:#e50914;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:1.1rem;font-weight:bold;cursor:pointer;box-shadow:0 2px 8px #0005;transition:background 0.2s;">Lire la vidéo</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(popup);

      document.getElementById('close-xlaflix-popup').onclick = () => popup.remove();
      popup.onclick = e => { if (e.target === popup) popup.remove(); };

      document.getElementById('popup-thumbnail').onclick = function() {
        this.style.transform = this.style.transform ? '' : 'scale(1.18)';
        this.style.zIndex = 3;
      };

      document.getElementById('play-xlaflix-video').onclick = function() {
        document.getElementById('popup-video-container').innerHTML = `
          <iframe width="100%" height="240" src="${video}?autoplay=1" frameborder="0" allowfullscreen style="border-radius:12px;box-shadow:0 2px 16px #000a;"></iframe>
        `;
      };
    };

    // Recherche locale sur les films
    document.querySelector('.search-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const query = this.q.value.trim().toLowerCase();
      const allCards = document.querySelectorAll('.card');
      let found = false;
      allCards.forEach(card => {
        const title = card.querySelector('.card-title')?.textContent?.toLowerCase() || '';
        if (title.includes(query)) {
          card.style.display = '';
          found = true;
        } else {
          card.style.display = 'none';
        }
      });

      // Affiche un message si aucun film trouvé
      let noResultMsg = document.getElementById('no-film-found');
      if (!found) {
        if (!noResultMsg) {
          noResultMsg = document.createElement('div');
          noResultMsg.id = 'no-film-found';
          noResultMsg.textContent = "Aucun film trouvé";
          noResultMsg.style.color = "#fff";
          noResultMsg.style.background = "#e50914";
          noResultMsg.style.padding = "12px";
          noResultMsg.style.textAlign = "center";
          noResultMsg.style.borderRadius = "8px";
          noResultMsg.style.margin = "24px auto";
          noResultMsg.style.maxWidth = "400px";
          document.querySelector('main').appendChild(noResultMsg);
        }
        this.q.value = '';
        this.q.placeholder = "Aucun film trouvé";
      } else if (noResultMsg) {
        noResultMsg.remove();
      }
    });
  </script>
