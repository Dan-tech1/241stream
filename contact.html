  <main>
    <section class="section" style="max-width:400px;margin:10px auto;">
      <h2>Contactez-nous</h2>
      <form class="contact-form" action="#" method="post" autocomplete="off">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required>
        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>
        <label for="message">Message :</label>
        <textarea id="message" name="message" rows="5" required></textarea>
        <button type="submit">Envoyer</button>
      </form>
      <div style="margin-top:18px;text-align:center;">
        <a href="mailto:support@241stream.com" style="color:#e50914;font-weight:bold;text-decoration:none;">
          <ion-icon name="mail-outline" style="vertical-align:middle;margin-right:6px;"></ion-icon>
          support@241stream.com
