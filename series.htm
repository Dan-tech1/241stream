  <script>
    // Séries d'action
    const actionSeries = [
      { title: "The Last of Us", video: "https://www.youtube.com/embed/uLtkt8BonwM", description: "Survivre dans un monde post-apocalyptique." },
      { title: "The Rookie", video: "https://www.youtube.com/embed/5KZ3MKraNKY", description: "Un nouveau flic dans la police de LA." },
      { title: "24 Heures Chrono", video: "https://www.youtube.com/embed/3AAZ2vTXp0I", description: "Jack Bauer contre le terrorisme." },
      { title: "Prison Break", video: "https://www.youtube.com/embed/AL9zLctDJaU", description: "Un plan d'évasion audacieux." },
      { title: "Arrow", video: "https://www.youtube.com/embed/XGsJzZuM6Bk", description: "Le justicier à l'arc." },
      { title: "Vikings", video: "https://www.youtube.com/embed/9GgxinPwAGc", description: "L'épopée des guerriers nordiques." },
      { title: "NCIS", video: "https://www.youtube.com/embed/2QqQG4wz2pA", description: "Enquêtes spéciales de la Navy." },
      { title: "Hawaii Five-0", video: "https://www.youtube.com/embed/2XQ7T8u1bTc", description: "Police d'élite à Hawaï." },
      { title: "Strike Back", video: "https://www.youtube.com/embed/0QkF7bQp1bQ", description: "Action militaire internationale." },
      { title: "Person of Interest", video: "https://www.youtube.com/embed/g1I4qU2NDak", description: "Surveillance et prévention du crime." }
    ];
    // Séries fantastiques
    const fantasticSeries = [
      { title: "Grimm", video: "https://www.youtube.com/embed/6bHZpISr1GE", description: "Contes et créatures revisités." },
      { title: "Game of Thrones", video: "https://www.youtube.com/embed/KPLWWIOCOOQ", description: "La lutte pour le trône de fer." },
      { title: "The Witcher", video: "https://www.youtube.com/embed/ndl1W4ltcmg", description: "Le sorceleur et ses monstres." },
      { title: "Stranger Things", video: "https://www.youtube.com/embed/b9EkMc79ZSU", description: "Le monde à l'envers menace Hawkins." },
      { title: "The Mandalorian", video: "https://www.youtube.com/embed/aOC8E8z_ifw", description: "Un chasseur de primes dans l'univers Star Wars." },
      { title: "The Umbrella Academy", video: "https://www.youtube.com/embed/0DAmWHxeoKw", description: "Des super-héros dysfonctionnels." },
      { title: "Shadow and Bone", video: "https://www.youtube.com/embed/b1WHQTbJ7vE", description: "Magie et guerre dans un empire déchiré." },
      { title: "Lucifer", video: "https://www.youtube.com/embed/X4bF_quwNtw", description: "Le diable mène l'enquête à LA." },
      { title: "Supernatural", video: "https://www.youtube.com/embed/4jm6B1nFz6g", description: "Deux frères face au surnaturel." },
      { title: "The 100", video: "https://www.youtube.com/embed/aDrsItJ_HU4", description: "Retour sur Terre après l'apocalypse." }
    ];
    // Séries comédie
    const comedySeries = [
      { title: "Les Simpson", video: "https://www.youtube.com/embed/HRV6tMR-SSs", description: "La famille la plus déjantée d'Amérique." },
      { title: "Friends", video: "https://www.youtube.com/embed/IEEbUzffzrk", description: "Les aventures de six amis à New York." },
      { title: "The Office", video: "https://www.youtube.com/embed/tNcDHWpselE", description: "La vie de bureau version décalée." },
      { title: "Brooklyn Nine-Nine", video: "https://www.youtube.com/embed/6Prfg3vyZkA", description: "La brigade la plus drôle de Brooklyn." },
      { title: "How I Met Your Mother", video: "https://www.youtube.com/embed/c3nScN89Klo", description: "La quête de l'amour à New York." },
      { title: "Big Bang Theory", video: "https://www.youtube.com/embed/WB1eYqFz2gI", description: "Les geeks les plus célèbres du monde." },
      { title: "Modern Family", video: "https://www.youtube.com/embed/XX9E2TxIx7o", description: "Une famille moderne et attachante." },
      { title: "Shameless", video: "https://www.youtube.com/embed/0dKzs68T4sY", description: "La famille Gallagher repousse les limites." },
      { title: "Malcolm", video: "https://www.youtube.com/embed/4g1iZ0YbRFI", description: "Un surdoué dans une famille folle." },
      { title: "LOL : Qui rit, sort !", video: "https://www.youtube.com/embed/6Qk6lYq5y8A", description: "Le jeu où il ne faut pas rire !" }
    ];

    function getYoutubeId(url) {
      const match = url.match(/embed\/([a-zA-Z0-9_-]+)/);
      return match ? match[1] : null;
    }

    function createCard(item) {
      const youtubeId = getYoutubeId(item.video);
      const thumbnail = youtubeId
        ? `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`
        : null;

      return `
        <div class="card" tabindex="0"
          data-title="${encodeURIComponent(item.title)}"
          data-video="${encodeURIComponent(item.video)}"
          data-description="${encodeURIComponent(item.description || '')}"
          data-thumbnail="${encodeURIComponent(thumbnail || '')}"
          onclick="showXlaflixPopup(this)">
          <div class="video-cover">
            ${thumbnail ? `<img src="${thumbnail}" alt="${item.title}" style="width:100%;height:180px;object-fit:cover;cursor:pointer;">` : `<span>Vidéo non supportée</span>`}
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:white;text-shadow:0 0 8px #000;">&#9658;</div>
          </div>
          <div class="card-title">${item.title}</div>
        </div>
      `;
    }
    document.getElementById('action-series').innerHTML =
      actionSeries.map(createCard).join('');
    document.getElementById('fantastic-series').innerHTML =
      fantasticSeries.map(createCard).join('');
    document.getElementById('comedy-series').innerHTML =
      comedySeries.map(createCard).join('');

    // Popup Xlaflix style
    window.showXlaflixPopup = function(cardElem) {
      const title = decodeURIComponent(cardElem.getAttribute('data-title'));
      const video = decodeURIComponent(cardElem.getAttribute('data-video'));
      const description = decodeURIComponent(cardElem.getAttribute('data-description'));
      const thumbnail = decodeURIComponent(cardElem.getAttribute('data-thumbnail'));

      let popup = document.getElementById('xlaflix-popup');
      if (popup) popup.remove();
      popup = document.createElement('div');
      popup.id = 'xlaflix-popup';
      popup.style.position = 'fixed';
      popup.style.top = 0;
      popup.style.left = 0;
      popup.style.width = '100vw';
      popup.style.height = '100vh';
      popup.style.background = 'rgba(0,0,0,0.92)';
      popup.style.display = 'flex';
      popup.style.alignItems = 'center';
      popup.style.justifyContent = 'center';
      popup.style.zIndex = 10001;
      popup.innerHTML = `
        <div style="background:#18122b;max-width:98vw;width:420px;border-radius:18px;box-shadow:0 8px 32px #000;position:relative;padding:0 0 24px 0;">
          <button id="close-xlaflix-popup" style="position:absolute;top:12px;right:12px;background:#e50914;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:1.3rem;cursor:pointer;z-index:2;">&times;</button>
          <div style="padding:24px 24px 0 24px;">
            <div style="position:relative;">
              <img src="${thumbnail}" alt="${title}" style="width:100%;max-width:100%;border-radius:12px;box-shadow:0 2px 16px #000a;transition:transform 0.2s;cursor:pointer;" id="popup-thumbnail">
            </div>
            <div style="margin:18px 0 8px 0;font-size:1.2rem;font-weight:bold;color:#fff;text-align:center;">${title}</div>
            <div style="color:#e50914;font-size:1rem;text-align:center;margin-bottom:12px;">${description || ""}</div>
          </div>
          <div style="padding:0 24px;">
            <div id="popup-video-container" style="margin-top:10px;display:flex;justify-content:center;">
              <button id="play-xlaflix-video" style="background:#e50914;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:1.1rem;font-weight:bold;cursor:pointer;box-shadow:0 2px 8px #0005;transition:background 0.2s;">Lire la vidéo</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(popup);

      document.getElementById('close-xlaflix-popup').onclick = () => popup.remove();
      popup.onclick = e => { if (e.target === popup) popup.remove(); };

      document.getElementById('popup-thumbnail').onclick = function() {
        this.style.transform = this.style.transform ? '' : 'scale(1.18)';
        this.style.zIndex = 3;
      };

      document.getElementById('play-xlaflix-video').onclick = function() {
        document.getElementById('popup-video-container').innerHTML = `
          <iframe width="100%" height="240" src="${video}?autoplay=1" frameborder="0" allowfullscreen style="border-radius:12px;box-shadow:0 2px 16px #000a;"></iframe>
        `;
      };
    };

    // Recherche locale sur les séries avec message si aucun résultat
    document.querySelector('.search-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = this.q;
      const query = input.value.trim().toLowerCase();
      const cards = document.querySelectorAll('.card');
      let found = false;
      cards.forEach(card => {
        const title = card.querySelector('.card-title')?.textContent?.toLowerCase() || '';
        if (title.includes(query)) {
          card.style.display = '';
          found = true;
        } else {
          card.style.display = 'none';
        }
      });

      // Affiche un message si aucune série trouvée
      let noResultMsg = document.getElementById('no-serie-found');
      if (!found) {
        if (!noResultMsg) {
          noResultMsg = document.createElement('div');
          noResultMsg.id = 'no-serie-found';
          noResultMsg.textContent = "Aucune série trouvée";
          noResultMsg.style.color = "#fff";
          noResultMsg.style.background = "#e50914";
          noResultMsg.style.padding = "12px";
          noResultMsg.style.textAlign = "center";
          noResultMsg.style.borderRadius = "8px";
          noResultMsg.style.margin = "24px auto";
          noResultMsg.style.maxWidth = "400px";
          document.querySelector('main').appendChild(noResultMsg);
        }
        input.value = '';
        input.placeholder = "Aucune série trouvée";
      } else if (noResultMsg) {
        noResultMsg.remove();
      }
    });
  </script>
