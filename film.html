  <script>
    // --- Xlaflix style popup pour les films ---
    const actionFilms = [
      { title: "John Wick", video: "https://www.youtube.com/embed/2AUmvWm5ZDQ", description: "Un tueur à gages reprend du service." },
      { title: "Fast & Furious 9", video: "https://www.youtube.com/embed/aSiDu3Ywi8E", description: "La saga de la vitesse continue." },
      { title: "Mission Impossible Fallout", video: "https://www.youtube.com/embed/wb49-oV0F78", description: "Ethan Hunt face à une nouvelle menace." },
      { title: "Extraction", video: "https://www.youtube.com/embed/L6P3nI6VnlY", description: "Un mercenaire en mission dangereuse." },
      { title: "Equalizer 2", video: "https://www.youtube.com/embed/HyNJ3UrGk_I", description: "La justice à la sauce McCall." },
      { title: "Bad Boys for Life", video: "https://www.youtube.com/embed/jKCj3XuPG8M", description: "Les flics de Miami sont de retour." },
      { title: "Tenet", video: "https://www.youtube.com/embed/L3pk_TBkihU", description: "Un thriller temporel signé Nolan." },
      { title: "Skyfall", video: "https://www.youtube.com/embed/6kw1UVovByw", description: "James Bond affronte son passé." },
      { title: "Mad Max: Fury Road", video: "https://www.youtube.com/embed/hEJnMQG9ev8", description: "Course-poursuite dans le désert post-apo." },
      { title: "Atomic Blonde", video: "https://www.youtube.com/embed/yIUube1pSC0", description: "Espionnage et action à Berlin." }
    ];
    const fantasticFilms = [
      { title: "Harry Potter 3", video: "https://www.youtube.com/embed/lAxgztbYDbs", description: "Le prisonnier d'Azkaban s'évade." },
      { title: "Wicked", video: "https://www.youtube.com/embed/6sP1b1PTPvg", description: "La magie prend vie." },
      { title: "Kraven the Hunter", video: "https://www.youtube.com/embed/rze8QYwWGMs", description: "Le chasseur ultime." },
      { title: "Adaline", video: "https://www.youtube.com/embed/yzP4kQhlPBY", description: "Une vie hors du temps." },
      { title: "Blanche Neige", video: "https://www.youtube.com/embed/VY67V0wOlz8", description: "Le conte revisité." },
      { title: "Red One", video: "https://www.youtube.com/embed/4nYSXdxjBwzVZUv1X9YnTQ9ZEhM", description: "Action et magie pour Noël." },
      { title: "Ratatouille", video: "https://www.youtube.com/embed/NgsQ8mVkN8w", description: "Un rat chef étoilé à Paris." },
      { title: "Descendants : L’Ascension de Red", video: "https://www.youtube.com/embed/7b2C5cH1yXw", description: "Les enfants de méchants prennent le pouvoir." },
      { title: "Les Visiteurs", video: "https://www.youtube.com/embed/0vKCLJZbytU", description: "Voyage dans le temps loufoque." },
      { title: "Les 4 Fantastiques", video: "https://www.youtube.com/embed/POBI7OhGB18", description: "Les super-héros de Marvel." }
    ];
    const horrorFilms = [
      { title: "Conjuring", video: "https://www.youtube.com/embed/k10ETZ41q5o", description: "L'horreur frappe à la porte." },
      { title: "Annabelle", video: "https://www.youtube.com/embed/KisPhy7T__Q", description: "La poupée maléfique revient." },
      { title: "Ça", video: "https://www.youtube.com/embed/xKJmEC5ieOk", description: "Le clown terrifiant de Derry." },
      { title: "Insidious", video: "https://www.youtube.com/embed/zuZnRUcoWos", description: "Voyage dans l'Au-delà." },
      { title: "Sinister", video: "https://www.youtube.com/embed/_kbQAJR9YWQ", description: "Des films retrouvés, une malédiction." },
      { title: "The Nun", video: "https://www.youtube.com/embed/pzD9zGcUNrw", description: "Le démon Valak sévit." },
      { title: "Paranormal Activity", video: "https://www.youtube.com/embed/F_UxLEqd074", description: "La terreur filmée à la maison." },
      { title: "REC", video: "https://www.youtube.com/embed/UPtyXbG1Z1w", description: "L'horreur en huis clos." },
      { title: "The Ring", video: "https://www.youtube.com/embed/TM1hP8HBdXs", description: "La cassette maudite." },
      { title: "Saw", video: "https://www.youtube.com/embed/S-1QgOMQ-ls", description: "Le jeu macabre commence." }
    ];

    function getYoutubeId(url) {
      const match = url.match(/embed\/([a-zA-Z0-9_-]+)/);
      return match ? match[1] : null;
    }

    function createCard(item) {
      const youtubeId = getYoutubeId(item.video);
      const thumbnail = youtubeId
        ? `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`
        : null;

      // Ajout du popup Xlaflix au clic
      return `
        <div class="card" tabindex="0"
          data-title="${encodeURIComponent(item.title)}"
          data-video="${encodeURIComponent(item.video)}"
          data-description="${encodeURIComponent(item.description || '')}"
          data-thumbnail="${encodeURIComponent(thumbnail || '')}"
          onclick="showXlaflixPopup(this)">
          <div class="video-cover">
            ${thumbnail ? `<img src="${thumbnail}" alt="${item.title}" style="width:100%;height:180px;object-fit:cover;cursor:pointer;">` : `<span>Vidéo non supportée</span>`}
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:white;text-shadow:0 0 8px #000;">&#9658;</div>
          </div>
          <div class="card-title">${item.title}</div>
        </div>
      `;
    }

    document.getElementById('action-films').innerHTML =
      actionFilms.map(createCard).join('');
    document.getElementById('fantastic-films').innerHTML =
      fantasticFilms.map(createCard).join('');
    document.getElementById('horror-films').innerHTML =
      horrorFilms.map(createCard).join('');

    // Popup Xlaflix style
    window.showXlaflixPopup = function(cardElem) {
      const title = decodeURIComponent(cardElem.getAttribute('data-title'));
      const video = decodeURIComponent(cardElem.getAttribute('data-video'));
      const description = decodeURIComponent(cardElem.getAttribute('data-description'));
      const thumbnail = decodeURIComponent(cardElem.getAttribute('data-thumbnail'));

      let popup = document.getElementById('xlaflix-popup');
      if (popup) popup.remove();
      popup = document.createElement('div');
      popup.id = 'xlaflix-popup';
      popup.style.position = 'fixed';
      popup.style.top = 0;
      popup.style.left = 0;
      popup.style.width = '100vw';
      popup.style.height = '100vh';
      popup.style.background = 'rgba(0,0,0,0.92)';
      popup.style.display = 'flex';
      popup.style.alignItems = 'center';
      popup.style.justifyContent = 'center';
      popup.style.zIndex = 10001;
      popup.innerHTML = `
        <div style="background:#18122b;max-width:98vw;width:420px;border-radius:18px;box-shadow:0 8px 32px #000;position:relative;padding:0 0 24px 0;">
          <button id="close-xlaflix-popup" style="position:absolute;top:12px;right:12px;background:#e50914;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:1.3rem;cursor:pointer;z-index:2;">&times;</button>
          <div style="padding:24px 24px 0 24px;">
            <div style="position:relative;">
              <img src="${thumbnail}" alt="${title}" style="width:100%;max-width:100%;border-radius:12px;box-shadow:0 2px 16px #000a;transition:transform 0.2s;cursor:pointer;" id="popup-thumbnail">
            </div>
            <div style="margin:18px 0 8px 0;font-size:1.2rem;font-weight:bold;color:#fff;text-align:center;">${title}</div>
            <div style="color:#e50914;font-size:1rem;text-align:center;margin-bottom:12px;">${description || ""}</div>
          </div>
          <div style="padding:0 24px;">
            <div id="popup-video-container" style="margin-top:10px;display:flex;justify-content:center;">
              <button id="play-xlaflix-video" style="background:#e50914;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:1.1rem;font-weight:bold;cursor:pointer;box-shadow:0 2px 8px #0005;transition:background 0.2s;">Lire la vidéo</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(popup);

      document.getElementById('close-xlaflix-popup').onclick = () => popup.remove();
      popup.onclick = e => { if (e.target === popup) popup.remove(); };

      document.getElementById('popup-thumbnail').onclick = function() {
        this.style.transform = this.style.transform ? '' : 'scale(1.18)';
        this.style.zIndex = 3;
      };

      document.getElementById('play-xlaflix-video').onclick = function() {
        document.getElementById('popup-video-container').innerHTML = `
          <iframe width="100%" height="240" src="${video}?autoplay=1" frameborder="0" allowfullscreen style="border-radius:12px;box-shadow:0 2px 16px #000a;"></iframe>
        `;
      };
    };

    // Recherche locale sur les films
    document.querySelector('.search-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const query = this.q.value.trim().toLowerCase();
      const allCards = document.querySelectorAll('.card');
      let found = false;
      allCards.forEach(card => {
        const title = card.querySelector('.card-title')?.textContent?.toLowerCase() || '';
        if (title.includes(query)) {
          card.style.display = '';
          found = true;
        } else {
          card.style.display = 'none';
        }
      });

      // Affiche un message si aucun film trouvé
      let noResultMsg = document.getElementById('no-film-found');
      if (!found) {
        if (!noResultMsg) {
          noResultMsg = document.createElement('div');
          noResultMsg.id = 'no-film-found';
          noResultMsg.textContent = "Aucun film trouvé";
          noResultMsg.style.color = "#fff";
          noResultMsg.style.background = "#e50914";
          noResultMsg.style.padding = "12px";
          noResultMsg.style.textAlign = "center";
          noResultMsg.style.borderRadius = "8px";
          noResultMsg.style.margin = "24px auto";
          noResultMsg.style.maxWidth = "400px";
          document.querySelector('main').appendChild(noResultMsg);
        }
        this.q.value = '';
        this.q.placeholder = "Aucun film trouvé";
      } else if (noResultMsg) {
        noResultMsg.remove();
      }
    });
  </script>
  <script src="script.js"></script>
</body>
